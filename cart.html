<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOXERA | Cart</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
--bg:#1B191A;
--cream:#E9E4E0;
--rust:#943A1F;
--card:#141213;
--border:rgba(148,58,31,.2);
}

body{
background:var(--bg);
color:var(--cream);
font-family:'Cairo',sans-serif;
min-height:100vh;
}

.logo-font{
font-family:'Bebas Neue',sans-serif;
letter-spacing:2px;
}

.price-font{
font-family:'Space Mono',monospace;
}

.cart-card{
background:var(--card);
border:1px solid var(--border);
}

.btn-rust{
background:var(--rust);
transition:.3s;
}

.btn-rust:hover{
transform:translateY(-2px);
}

.empty-icon{
font-size:80px;
opacity:.2;
}
</style>
</head>
<body>

<!-- NAV -->

<nav class="border-b border-[#943A1F33] bg-[#141213]">
<div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

<a href="index.html" class="flex items-center gap-3">
<img src="logo.png" class="h-10" alt="NOXERA">
<h1 class="logo-font text-3xl">NOXERA</h1>
</a>

<div class="flex items-center gap-6">

<a href="index.html" class="hover:text-[#943A1F]">
HOME
</a>

<a href="cart.html" class="text-[#943A1F]">
<i class="fas fa-shopping-bag text-xl"></i>
</a>

</div>
</div>
</nav>

<!-- PAGE -->

<section class="max-w-6xl mx-auto px-5 py-10">

<h1 class="logo-font text-6xl mb-8">
YOUR CART
</h1>

<div id="cartContent"></div>

</section>

<script>

function clearCart(){

localStorage.removeItem('selectedProduct');
localStorage.removeItem('selectedPrice');
localStorage.removeItem('selectedImg');
localStorage.removeItem('selectedId');

location.reload();
}

function renderCart(){

const product =
localStorage.getItem('selectedProduct');

const price =
localStorage.getItem('selectedPrice');

const img =
localStorage.getItem('selectedImg');

const container =
document.getElementById('cartContent');

if(!product){

container.innerHTML = `
<div class="text-center py-20">

<div class="empty-icon">
<i class="fas fa-shopping-bag"></i>
</div>

<h2 class="text-3xl mt-6 mb-3">
السلة فارغة
</h2>

<p class="opacity-70 mb-8">
لم تقم بإضافة أي منتجات بعد
</p>

<a href="index.html"
class="inline-block px-8 py-3 rounded-full btn-rust">
العودة للتسوق
</a>

</div>
`;

return;
}

container.innerHTML = `

<div class="grid lg:grid-cols-3 gap-8">

<div class="lg:col-span-2">

<div class="cart-card rounded-3xl overflow-hidden">

<div class="grid md:grid-cols-3">

<div>
<img src="${img}"
class="w-full h-full object-cover">
</div>

<div class="md:col-span-2 p-6">

<h2 class="logo-font text-4xl mb-3">
${product}
</h2>

<p class="opacity-70 mb-6">
منتج من مجموعة NOXERA الجديدة.
</p>

<div class="price-font text-2xl text-[#943A1F]">
${price} ج.م
</div>

</div>

</div>

</div>

</div>

<div>

<div class="cart-card rounded-3xl p-6 sticky top-5">

<h3 class="logo-font text-4xl mb-6">
SUMMARY
</h3>

<div class="flex justify-between mb-4">
<span>المنتج</span>
<span>${product}</span>
</div>

<div class="flex justify-between mb-6">
<span>السعر</span>
<span class="price-font">
${price} ج.م
</span>
</div>

<hr class="border-[#943A1F33] mb-6">

<div class="flex justify-between text-xl font-bold mb-8">
<span>الإجمالي</span>
<span class="price-font">
${price} ج.م
</span>
</div>

<button
onclick="location.href='checkout.html'"
class="w-full py-3 rounded-full btn-rust mb-3">

استكمال الطلب

</button>

<button
onclick="clearCart()"
class="w-full py-3 rounded-full border border-[#943A1F66]">

حذف المنتج

</button>

</div>

</div>

</div>

`;
}

renderCart();

</script>

</body>
</html>
