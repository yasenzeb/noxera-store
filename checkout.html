<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOXERA — إتمام الطلب</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --bg:#1B191A; --cream:#E9E4E0; --rust:#943A1F; --card:#141213; --border:rgba(148,58,31,0.2); }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); color:var(--cream); font-family:'Cairo',sans-serif; }

    nav {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      background:#141213; border-bottom:1px solid var(--border);
      padding:0 2rem; height:64px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .nav-logo { display:flex; align-items:center; gap:12px; text-decoration:none; }
    .nav-logo img { height:36px; object-fit:contain; }
    .nav-logo span { font-family:'Bebas Neue'; font-size:1.6rem; color:var(--cream); letter-spacing:3px; }
    .nav-links a { color:var(--cream); text-decoration:none; font-family:'Bebas Neue'; font-size:1rem; letter-spacing:2px; opacity:0.7; transition:opacity 0.3s,color 0.3s; margin-right:1.5rem; }
    .nav-links a:hover { opacity:1; color:var(--rust); }

    .checkout-wrap {
      min-height:100vh; padding-top:64px;
      display:grid; grid-template-columns:1fr 420px;
      max-width:1200px; margin:0 auto; padding-left:2rem; padding-right:2rem; padding-bottom:4rem; gap:3rem;
      align-items:start;
    }

    /* LEFT — FORM */
    .form-col { padding-top:4rem; }
    .page-label { font-family:'Space Mono'; font-size:0.7rem; color:var(--rust); letter-spacing:4px; margin-bottom:0.6rem; }
    .page-title { font-family:'Bebas Neue'; font-size:clamp(2.5rem,6vw,5rem); color:var(--cream); letter-spacing:3px; line-height:1; margin-bottom:2.5rem; }

    /* AI PARSER BOX */
    .ai-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:6px; padding:1.5rem; margin-bottom:2rem;
    }
    .ai-box-header { display:flex; align-items:center; gap:10px; margin-bottom:1rem; }
    .ai-badge {
      background:var(--rust); color:white; font-family:'Space Mono';
      font-size:0.6rem; padding:3px 8px; border-radius:2px; letter-spacing:2px;
    }
    .ai-box-title { font-family:'Bebas Neue'; font-size:1.2rem; color:var(--cream); letter-spacing:2px; }
    .ai-box p { font-family:'Cairo'; font-size:0.82rem; color:var(--cream); opacity:0.45; margin-bottom:1rem; line-height:1.6; }
    .ai-textarea {
      width:100%; background:#1a1718; border:1px solid var(--border);
      color:var(--cream); font-family:'Cairo'; font-size:0.9rem;
      padding:12px; border-radius:4px; resize:vertical; min-height:80px;
      outline:none; transition:border-color 0.3s;
    }
    .ai-textarea:focus { border-color:var(--rust); }
    .ai-textarea::placeholder { opacity:0.3; }
    .btn-ai {
      margin-top:0.8rem; background:transparent; border:1px solid var(--rust);
      color:var(--rust); padding:10px 24px; border-radius:100px;
      font-family:'Bebas Neue'; font-size:0.9rem; letter-spacing:2px;
      cursor:pointer; transition:all 0.3s; display:flex; align-items:center; gap:8px;
    }
    .btn-ai:hover { background:var(--rust); color:var(--cream); }
    .btn-ai:disabled { opacity:0.4; cursor:not-allowed; }
    .ai-status { font-family:'Space Mono'; font-size:0.7rem; margin-top:0.6rem; letter-spacing:1px; }

    /* FORM FIELDS */
    .field-group { margin-bottom:1.4rem; }
    .field-label { font-family:'Space Mono'; font-size:0.65rem; color:var(--cream); opacity:0.5; letter-spacing:3px; margin-bottom:0.5rem; display:block; }
    .field-input {
      width:100%; background:var(--card); border:1px solid var(--border);
      color:var(--cream); font-family:'Cairo'; font-size:0.95rem;
      padding:14px 16px; border-radius:4px; outline:none; transition:border-color 0.3s;
    }
    .field-input:focus { border-color:var(--rust); }
    .field-input::placeholder { opacity:0.25; }
    .field-select {
      width:100%; background:var(--card); border:1px solid var(--border);
      color:var(--cream); font-family:'Cairo'; font-size:0.95rem;
      padding:14px 16px; border-radius:4px; outline:none; cursor:pointer;
      transition:border-color 0.3s; appearance:none;
    }
    .field-select:focus { border-color:var(--rust); }
    .field-select option { background:#1B191A; }
    .field-error { font-family:'Cairo'; font-size:0.75rem; color:#e05555; margin-top:0.4rem; display:none; }
    .field-error.show { display:block; }

    .fields-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }

    /* PAY METHOD */
    .pay-methods { display:flex; gap:1rem; flex-wrap:wrap; }
    .pay-opt {
      flex:1; min-width:120px; background:var(--card); border:1px solid var(--border);
      border-radius:4px; padding:14px; cursor:pointer; transition:border-color 0.3s;
      display:flex; align-items:center; gap:10px;
    }
    .pay-opt.selected { border-color:var(--rust); }
    .pay-opt input { accent-color:var(--rust); }
    .pay-opt label { font-family:'Cairo'; font-size:0.9rem; color:var(--cream); cursor:pointer; }

    .btn-submit {
      width:100%; background:var(--rust); color:var(--cream);
      padding:18px; border:none; border-radius:100px;
      font-family:'Bebas Neue'; font-size:1.2rem; letter-spacing:4px;
      cursor:pointer; transition:background 0.3s, transform 0.2s;
      display:flex; align-items:center; justify-content:center; gap:10px; margin-top:2rem;
    }
    .btn-submit:hover { background:#b5491e; transform:scale(1.02); }

    /* RIGHT — ORDER SUMMARY */
    .summary-col {
      padding-top:4rem;
      position:sticky; top:80px;
    }
    .summary-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:6px; overflow:hidden;
    }
    .summary-header {
      padding:1.2rem 1.5rem; border-bottom:1px solid var(--border);
      font-family:'Bebas Neue'; font-size:1.1rem; letter-spacing:3px; color:var(--cream); opacity:0.6;
    }
    .summary-product { display:flex; gap:1rem; padding:1.5rem; border-bottom:1px solid var(--border); }
    .summary-img { width:70px; aspect-ratio:3/4; background:#1a1718; border-radius:2px; overflow:hidden; flex-shrink:0; }
    .summary-img img { width:100%; height:100%; object-fit:cover; }
    .summary-img .no-img { width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.08); font-size:1.5rem; }
    .summary-name { font-family:'Bebas Neue'; font-size:1.1rem; color:var(--cream); letter-spacing:1px; margin-bottom:0.3rem; }
    .summary-pname-label { font-family:'Space Mono'; font-size:0.6rem; color:var(--cream); opacity:0.3; letter-spacing:2px; margin-bottom:0.3rem; }

    .summary-rows { padding:1.2rem 1.5rem; }
    .summary-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.9rem; }
    .summary-row-label { font-family:'Cairo'; font-size:0.85rem; color:var(--cream); opacity:0.45; }
    .summary-row-val { font-family:'Space Mono'; font-size:0.85rem; color:var(--cream); }
    .summary-row-val.shipping { color:var(--cream); }
    .summary-divider { border:none; border-top:1px solid var(--border); margin:0.8rem 0; }
    .summary-total-row { display:flex; justify-content:space-between; align-items:center; }
    .summary-total-label-txt { font-family:'Bebas Neue'; font-size:1rem; color:var(--cream); letter-spacing:2px; }
    .summary-total-amt { font-family:'Bebas Neue'; font-size:2rem; color:var(--rust); }

    @media(max-width:900px){
      .checkout-wrap { grid-template-columns:1fr; }
      .summary-col { position:static; padding-top:0; }
      .fields-row { grid-template-columns:1fr; }
      nav { padding:0 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <img src="logo.png" alt="NOXERA" onerror="this.style.display='none'">
    <span>NOXERA</span>
  </a>
  <div class="nav-links">
    <a href="index.html">HOME</a>
    <a href="cart.html"><i class="fas fa-shopping-bag"></i></a>
  </div>
</nav>

<div class="checkout-wrap">

  <!-- FORM -->
  <div class="form-col">
    <div class="page-label">CHECKOUT</div>
    <h1 class="page-title">إتمام<br>الطلب</h1>

    <!-- AI PARSER -->
    <div class="ai-box">
      <div class="ai-box-header">
        <span class="ai-badge">AI</span>
        <span class="ai-box-title">أدخل بياناتك بالكلام العادي</span>
      </div>
      <p>اكتب اسمك ورقمك ومحافظتك وعنوانك في سطر واحد — وسيملأ الذكاء الاصطناعي الفورم تلقائياً</p>
      <textarea class="ai-textarea" id="aiInput" placeholder='مثال: "أنا محمد أحمد، موبايلي 01012345678، من المنصورة دقهلية، شارع الجلاء بجوار المسجد"'></textarea>
      <button class="btn-ai" id="aiBtn" onclick="runAIFormParser()">
        <i class="fas fa-magic"></i> تحليل بالذكاء الاصطناعي
      </button>
      <div class="ai-status" id="aiStatus"></div>
    </div>

    <!-- FIELDS -->
    <div class="field-group">
      <label class="field-label">الاسم الكامل</label>
      <input type="text" class="field-input" id="custName" placeholder="محمد أحمد" oninput="validateNameInput()">
      <div class="field-error" id="nameError">الاسم يجب أن يكون حرفين على الأقل</div>
    </div>

    <div class="field-group">
      <label class="field-label">رقم الموبايل</label>
      <input type="tel" class="field-input" id="custPhone" placeholder="01xxxxxxxxx" oninput="validatePhoneInput()">
      <div class="field-error" id="phoneError">أدخل رقم مصري صحيح (010/011/012/015)</div>
    </div>

    <div class="fields-row">
      <div class="field-group">
        <label class="field-label">المحافظة</label>
        <select class="field-select" id="custGov" onchange="handleGovChange()">
          <option value="">اختر المحافظة</option>
        </select>
      </div>
      <div class="field-group">
        <label class="field-label">تكلفة الشحن</label>
        <input type="text" class="field-input" id="shippingDisplay" value="اختر المحافظة أولاً" readonly style="opacity:0.5;cursor:default">
      </div>
    </div>

    <div class="field-group">
      <label class="field-label">العنوان التفصيلي</label>
      <input type="text" class="field-input" id="custAddress" placeholder="الشارع، رقم المبنى، أقرب معلم...">
    </div>

    <div class="field-group">
      <label class="field-label">طريقة الدفع</label>
      <div class="pay-methods">
        <div class="pay-opt selected" onclick="selectPay(this,'كاش عند الاستلام')">
          <input type="radio" name="pay" id="pay1" checked>
          <label for="pay1"><i class="fas fa-money-bill-wave" style="color:var(--rust);margin-left:6px"></i> كاش عند الاستلام</label>
        </div>
        <div class="pay-opt" onclick="selectPay(this,'تحويل بنكي')">
          <input type="radio" name="pay" id="pay2">
          <label for="pay2"><i class="fas fa-university" style="color:var(--rust);margin-left:6px"></i> تحويل بنكي</label>
        </div>
      </div>
    </div>

    <button class="btn-submit" onclick="sendToWhatsApp(event)">
      <i class="fab fa-whatsapp" style="font-size:1.3rem"></i>
      أكمل الطلب عبر واتساب
    </button>
  </div>

  <!-- SUMMARY -->
  <div class="summary-col">
    <div class="summary-box">
      <div class="summary-header">ملخص الطلب</div>
      <div class="summary-product">
        <div class="summary-img" id="summaryImg">
          <div class="no-img"><i class="fas fa-tshirt"></i></div>
        </div>
        <div>
          <div class="summary-pname-label">NOXERA</div>
          <div class="summary-name" id="summaryName">—</div>
        </div>
      </div>
      <div class="summary-rows">
        <div class="summary-row">
          <span class="summary-row-label">سعر المنتج</span>
          <span class="summary-row-val" id="summaryPrice">—</span>
        </div>
        <div class="summary-row">
          <span class="summary-row-label">الشحن</span>
          <span class="summary-row-val shipping" id="summaryShipping">اختر المحافظة</span>
        </div>
        <hr class="summary-divider">
        <div class="summary-total-row">
          <span class="summary-total-label-txt">الإجمالي</span>
          <span class="summary-total-amt" id="summaryTotal">—</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  const egyptGovernorates = [
    { name:"القاهرة", price:95 }, { name:"الجيزة", price:95 },
    { name:"الإسكندرية", price:50 },
    { name:"أسوان", price:150 }, { name:"الأقصر", price:150 },
    { name:"مطروح", price:150 }, { name:"جنوب سيناء", price:150 },
    { name:"القليوبية", price:110 }, { name:"الدقهلية", price:110 },
    { name:"الغربية", price:110 }, { name:"الشرقية", price:110 },
    { name:"المنوفية", price:110 }, { name:"دمياط", price:110 },
    { name:"البحيرة", price:110 }, { name:"كفر الشيخ", price:110 },
    { name:"بورسعيد", price:110 }, { name:"الإسماعيلية", price:110 },
    { name:"السويس", price:110 }, { name:"الفيوم", price:130 },
    { name:"بني سويف", price:130 }, { name:"المنيا", price:130 },
    { name:"أسيوط", price:130 }, { name:"سوهاج", price:130 },
    { name:"قنا", price:130 }, { name:"البحر الأحمر", price:130 },
    { name:"الوادي الجديد", price:130 }, { name:"شمال سيناء", price:130 }
  ];

  var baseProductPrice = 0;
  var shippingCostAmount = 0;
  var detectedGovText = '';
  var selectedPayMethod = 'كاش عند الاستلام';

  // Init
  (function init() {
    const name  = localStorage.getItem('selectedProduct') || '';
    const price = parseInt(localStorage.getItem('selectedPrice')) || 0;
    const img   = localStorage.getItem('selectedImg') || '';
    baseProductPrice = price;

    document.getElementById('summaryName').innerText = name || '—';
    document.getElementById('summaryPrice').innerText = price ? price + ' ج.م' : '—';
    document.getElementById('summaryTotal').innerText = price ? price + ' ج.م' : '—';

    if (img) {
      document.getElementById('summaryImg').innerHTML = `<img src="${img}" alt="${name}">`;
    }

    // Populate gov select
    const sel = document.getElementById('custGov');
    egyptGovernorates.forEach(g => {
      const opt = document.createElement('option');
      opt.value = g.name;
      opt.textContent = `${g.name} — ${g.price} ج.م`;
      sel.appendChild(opt);
    });
  })();

  function handleGovChange() {
    const val = document.getElementById('custGov').value;
    const gov = egyptGovernorates.find(g => g.name === val);
    if (gov) {
      shippingCostAmount = gov.price;
      detectedGovText = gov.name;
      document.getElementById('shippingDisplay').value = gov.price + ' ج.م';
      document.getElementById('summaryShipping').innerText = gov.price + ' ج.م';
      document.getElementById('summaryTotal').innerText = (baseProductPrice + gov.price) + ' ج.م';
    } else {
      shippingCostAmount = 0;
      document.getElementById('shippingDisplay').value = 'اختر المحافظة أولاً';
      document.getElementById('summaryShipping').innerText = 'اختر المحافظة';
      document.getElementById('summaryTotal').innerText = baseProductPrice ? baseProductPrice + ' ج.م' : '—';
    }
  }

  function selectPay(el, method) {
    document.querySelectorAll('.pay-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    el.querySelector('input[type=radio]').checked = true;
    selectedPayMethod = method;
  }

  function validateNameInput() {
    const val = document.getElementById('custName').value.trim();
    const err = document.getElementById('nameError');
    if (val.length >= 2) { err.classList.remove('show'); return true; }
    err.classList.add('show'); return false;
  }

  function validatePhoneInput() {
    const val = document.getElementById('custPhone').value.trim();
    const err = document.getElementById('phoneError');
    if (/^(010|011|012|015)\d{8}$/.test(val)) { err.classList.remove('show'); return true; }
    err.classList.add('show'); return false;
  }

  async function fetchGeminiAIAnalysis(userText) {
    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: userText })
    });
    if (!response.ok) throw new Error("حاول تاني");
    return await response.json();
  }

  async function runAIFormParser() {
    const aiInput = document.getElementById('aiInput').value.trim();
    const btn = document.getElementById('aiBtn');
    const status = document.getElementById('aiStatus');
    if (!aiInput || aiInput.length < 5) {
      status.style.color = '#e05555';
      status.innerText = 'اكتب بياناتك أولاً';
      return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحليل...';
    status.style.color = 'rgba(233,228,224,0.4)';
    status.innerText = 'الذكاء الاصطناعي بيحلل بياناتك...';
    try {
      const data = await fetchGeminiAIAnalysis(aiInput);
      if (data.name) document.getElementById('custName').value = data.name;
      if (data.phone) document.getElementById('custPhone').value = data.phone;
      if (data.address) document.getElementById('custAddress').value = data.address;
      if (data.governorate) {
        const match = egyptGovernorates.find(g =>
          data.governorate.includes(g.name) || g.name.includes(data.governorate)
        );
        if (match) {
          document.getElementById('custGov').value = match.name;
          handleGovChange();
        }
      }
      status.style.color = '#5ecf7a';
      status.innerText = '✓ تم ملء البيانات تلقائياً';
    } catch(err) {
      status.style.color = '#e05555';
      status.innerText = 'فشل التحليل — تأكد من الاتصال وحاول مجدداً';
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-magic"></i> تحليل بالذكاء الاصطناعي';
    }
  }

  function sendToWhatsApp(event) {
    event.preventDefault();
    if (!validateNameInput() || !validatePhoneInput()) return;

    const product = localStorage.getItem('selectedProduct') || "منتج من NOXERA";
    const name    = document.getElementById('custName').value.trim();
    const phone   = document.getElementById('custPhone').value.trim();
    const address = document.getElementById('custAddress').value.trim();
    const gov     = detectedGovText || document.getElementById('custGov').value;
    const total   = baseProductPrice + shippingCostAmount;

    const message =
      `🖤 *طلب جديد من NOXERA* 🖤\n\n` +
      `👕 *المنتج:* ${product}\n` +
      `💵 *السعر:* ${baseProductPrice} ج.م\n` +
      `🚚 *الشحن:* ${shippingCostAmount} ج.م\n` +
      `💰 *الإجمالي:* ${total} ج.م\n\n` +
      `👤 *الاسم:* ${name}\n` +
      `📞 *الموبايل:* ${phone}\n` +
      `📍 *المحافظة:* ${gov}\n` +
      `🏡 *العنوان:* ${address}\n` +
      `💳 *الدفع:* ${selectedPayMethod}`;

    window.open(`https://wa.me/201204761076?text=${encodeURIComponent(message)}`, '_blank');
    localStorage.clear();
    window.location.href = 'success.html';
  }
</script>
</body>
</html>
