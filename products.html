<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOXERA — Product Details</title>
  
  <!-- استدعاء الخطوط المستقرة -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@300;400;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg: #1B191A;
      --cream: #E9E4E0;
      --rust: #943A1F;
      --card: #141213;
      --border: rgba(148,58,31,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--cream); font-family: 'Cairo', sans-serif; overflow-x: hidden; width: 100%; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #141213; border-bottom: 1px solid var(--border);
      padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo span { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--cream); letter-spacing: 3px; }
    .nav-links { display: flex; align-items: center; gap: 2rem; }
    .nav-links a { color: var(--cream); text-decoration: none; font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; opacity: 0.7; }
    .cart-icon { position: relative; }
    .cart-badge {
      position: absolute; top: -8px; right: -8px; background: var(--rust); color: white;
      font-family: 'Space Mono', monospace; font-size: 10px; width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }

    /* PRODUCT LAYOUT */
    .product-container { max-width: 1200px; margin: 120px auto 60px; padding: 0 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; }
    .product-media img { width: 100%; border-radius: 4px; border: 1px solid var(--border); object-fit: cover; aspect-ratio: 3/4; background: #1a1718; }
    .product-meta-title { font-family: 'Outfit', 'Syne', sans-serif; font-weight: 900; font-size: clamp(2rem, 4vw, 3.5rem); line-height: 1.1; margin-bottom: 1rem; color: var(--cream); }
    .product-meta-price { font-family: 'Space Mono', monospace; font-size: 1.8rem; color: var(--rust); font-weight: 700; margin-bottom: 2rem; }
    
    .selector-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 0.5rem; opacity: 0.6; }
    .size-options { display: flex; gap: 0.75rem; margin-bottom: 2.5rem; }
    .size-btn {
      border: 1px solid var(--border); background: transparent; color: var(--cream);
      padding: 10px 24px; font-family: 'Space Mono', monospace; font-size: 0.9rem; cursor: pointer; transition: all 0.3s;
    }
    .size-btn:hover, .size-btn.active { border-color: var(--rust); background: var(--rust); }
    
    .action-btn {
      width: 100%; background: var(--rust); color: var(--cream); border: none; padding: 18px;
      font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 3px; cursor: pointer; transition: background 0.3s;
    }
    .action-btn:hover { background: #b5491e; }

    /* FOOTER */
    footer { background: var(--card); border-top: 1px solid var(--border); padding: 3rem 2rem; text-align: center; }
    .footer-logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; letter-spacing: 6px; color: var(--cream); }
    .footer-copy { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--cream); opacity: 0.2; letter-spacing: 2px; margin-top: 1rem; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .product-container { grid-template-columns: 1fr; gap: 2rem; margin-top: 90px; padding: 0 1.25rem; }
      .product-meta-title { font-size: 2rem; }
      .size-options { gap: 0.5rem; }
      .size-btn { padding: 8px 18px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><span>NOXERA</span></a>
  <div class="nav-links">
    <a href="index.html">HOME</a>
    <a href="index.html#shop">SHOP</a>
    <a href="cart.html" class="cart-icon">
      <i class="fas fa-shopping-bag"></i>
      <span class="cart-badge" id="cartBadge" style="display:none">1</span>
    </a>
  </div>
</nav>

<div class="product-container">
  <div class="product-media">
    <img id="pImg" src="" alt="">
  </div>
  <div class="product-content">
    <h1 class="product-meta-title" id="pName">PRODUCT NAME</h1>
    <div class="product-meta-price" id="pPrice">0 ج.م</div>
    
    <div class="selector-title">SELECT SIZE</div>
    <div class="size-options">
      <button class="size-btn" onclick="selectSize(this)">S</button>
      <button class="size-btn" onclick="selectSize(this)">M</button>
      <button class="size-btn" onclick="selectSize(this)">L</button>
      <button class="size-btn" onclick="selectSize(this)">XL</button>
      <button class="size-btn" onclick="selectSize(this)">XXL</button>
    </div>

    <button class="action-btn" onclick="addToCart()">ADD TO BAG</button>
  </div>
</div>

<footer>
  <div class="footer-logo">NOXERA</div>
  <p class="footer-copy">© 2026 NOXERA — ALL RIGHTS RESERVED</p>
</footer>

<script>
  let selectedSizeStr = '';
  
  // تحميل بيانات المنتج المختار من الـ LocalStorage
  const pName = localStorage.getItem('selectedProduct');
  const pPrice = localStorage.getItem('selectedPrice');
  const pImg = localStorage.getItem('selectedImg');
  const pId = localStorage.getItem('selectedId');

  if(pName && pPrice) {
    document.getElementById('pName').innerText = pName;
    document.getElementById('pPrice').innerText = pPrice + ' ج.م';
    document.getElementById('pImg').src = pImg || '';
    document.getElementById('pImg').alt = pName;
  } else {
    window.location.href = 'index.html';
  }

  function selectSize(btn) {
    document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedSizeStr = btn.innerText;
  }

  function addToCart() {
    if(!selectedSizeStr) {
      alert('الرجاء اختيار المقاس أولاً');
      return;
    }
    
    // حفظ بيانات المنتج المختار لإرسالها لصفحة السلة
    const cartItem = {
      id: pId,
      name: pName,
      price: pPrice,
      img: pImg,
      size: selectedSizeStr,
      qty: 1
    };
    
    localStorage.setItem('cartItem', JSON.stringify(cartItem));
    updateCartBadge();
    window.location.href = 'cart.html';
  }

  function updateCartBadge() {
    const item = localStorage.getItem('cartItem');
    const badge = document.getElementById('cartBadge');
    if(item && badge) { badge.style.display = 'flex'; }
  }
  updateCartBadge();
</script>
</body>
</html>
